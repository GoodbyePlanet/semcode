services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jina Code V2 served by HuggingFace Text Embeddings Inference. Default
  # embedding backend. To use a hosted provider instead (Voyage / OpenAI) or a
  # local Ollama install, set EMBEDDINGS_PROVIDER + the relevant API key in
  # .env, then comment out:
  #   1. this entire `jina-embeddings` service
  #   2. the `jina-embeddings` entry under `semcode.depends_on`
  #   3. the JINA_URL line under `semcode.environment`
  jina-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    platform: linux/amd64
    container_name: jina-embeddings
    command: --model-id jinaai/jina-embeddings-v2-base-code
    volumes:
      - embeddings_cache:/data
    ports:
      - "8087:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  semcode:
    build: .
    platform: linux/amd64
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      JINA_URL: http://jina-embeddings:80
      QDRANT_URL: http://qdrant:6333
      MCP_HOST: 0.0.0.0
      FASTEMBED_CACHE_PATH: /fastembed_cache
    depends_on:
      qdrant:
        condition: service_healthy
      jina-embeddings:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - fastembed_cache:/fastembed_cache

volumes:
  qdrant_data:
  embeddings_cache:
  fastembed_cache:
