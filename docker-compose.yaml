services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  jina-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    platform: linux/amd64
    container_name: jina-embeddings
    command: --model-id jinaai/jina-embeddings-v2-base-code
    volumes:
      - embeddings_cache:/data
    ports:
      - "8087:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  jina-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    platform: linux/amd64
    container_name: jina-reranker
    command: --model-id BAAI/bge-reranker-v2-m3 --max-client-batch-size 64 --max-batch-tokens 65536
    volumes:
      - reranker_cache:/data
    ports:
      - "8088:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 360s

  code-search:
    build: .
    platform: linux/amd64
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      EMBEDDINGS_URL: http://jina-embeddings:80
      QDRANT_URL: http://qdrant:6333
      RERANKER_URL: http://jina-reranker:80
      RERANKER_ENABLED: "true"
    depends_on:
      qdrant:
        condition: service_healthy
      jina-embeddings:
        condition: service_healthy
      jina-reranker:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro

volumes:
  qdrant_data:
  embeddings_cache:
  reranker_cache:
